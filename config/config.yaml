# Global system configuration. Non-secret. Secrets live in .env.
# Tunables here are version-controlled so changes are auditable.

system:
  timezone: "Asia/Kolkata"
  market: "NSE"

data:
  history_years: 5
  universe_file: "config/stocks_universe.txt"
  holidays_file: "config/nse_holidays.yaml"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

ingestion:
  bhavcopy:
    # Old format: pre 2024-07-08 ; new format from 2024-07-08
    cutover_date: "2024-07-08"
    old_url_template: "https://archives.nseindia.com/content/historical/EQUITIES/{yyyy}/{mmm_upper}/cm{dd}{mmm_upper}{yyyy}bhav.csv.zip"
    new_url_template: "https://nsearchives.nseindia.com/content/cm/BhavCopy_NSE_CM_0_0_0_{yyyymmdd}_F_0000.csv.zip"
    warmup_url: "https://www.nseindia.com/"
  yfinance:
    suffix: ".NS"
    interval: "1d"
    auto_adjust: true

validation:
  cross_source:
    close_tolerance_pct: 0.10
    volume_tolerance_pct: 2.00
    fail_threshold_rows_pct: 0.50  # > 0.5% mismatched rows = run failure
  split_audit:
    # Known events used to verify yfinance adjusts splits/bonuses correctly.
    # Format: each row is checked by data/seed/known_corporate_actions.csv

logging:
  rotation: "10 MB"
  retention: "14 days"
  level_default: "INFO"
